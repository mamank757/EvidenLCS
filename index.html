<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EVIDEN LCS DIGITAL - King Mamank</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
* { box-sizing: border-box; }
body { font-family: Arial, sans-serif; background: #000; margin: 0; padding: 0; }

.panel-kendali {
    background: #ffffff; padding: 10px; display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; z-index: 9999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 100%;
}

button { padding: 10px 12px; cursor: pointer; border-radius: 6px; border: none; color: white; font-weight: bold; font-size: 11px; }
.btn-print { background: #0b544e; flex: 2; margin: 0 5px; }
.btn-add { background: #27ae60; flex: 1; }
.btn-reset { background: #dc3545; flex: 1; }

.kertas-wrapper { padding: 10px; display: flex; justify-content: center; }

.kertas-a4 {
    width: 210mm;
    height: 297mm;
    padding: 5mm 12mm 5mm 12mm;
    background: white;
    box-sizing: border-box;
    overflow: hidden;
}

.judul-laporan {
    text-align: center;
    font-weight: bold;
    font-size: 12pt;
    margin-bottom: 15px;
    text-transform: uppercase;
    line-height: 1.2;
}

.identitas {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 15px;
    font-size: 10pt;
    table-layout: fixed;
}

.identitas td { padding: 4px 0; }

.label-id { width: 140px; font-weight: bold; }
.titik-id { width: 15px; text-align: center; }

.identitas input, .identitas select {
    width: 100%;
    border: none;
    font-size: 10pt;
    background: transparent;
    outline: none;
}

table.tabel-data {
    width: 100%;
    border-collapse: collapse;
    border: 1.5px solid black;
    table-layout: fixed;
}

table.tabel-data th {
    background-color: #2ecc71 !important;
    color: black;
    padding: 6px 2px;
    border: 1px solid black;
    font-size: 8pt;
}

table.tabel-data td {
    border: 1px solid black;
    padding: 3px;
    font-size: 8pt;
    text-align: center;
    height: 150px;
}

.col-no { width: 30px; }
.col-tgl { width: 90px; }
.col-foto { width: 90px; }

textarea.input-judul {
    width: 95%;
    height: 135px;
    border: none;
    resize: none;
    font-size: 8pt;
    outline: none;
}

.foto-container {
    width: 100%;
    height: 135px;
    border: 1px dashed #ccc;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

.img-preview {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: none;
}

.file-input {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
}

.label-foto {
    font-size: 7pt;
    color: #888;
    text-align: center;
    position: absolute;
}
</style>
</head>

<body onload="muatDataLokal()">

<div class="panel-kendali" id="toolbar">
<button class="btn-add" onclick="tambahBaris()">+ BARIS</button>
<button class="btn-print" onclick="simpanPDFAndroid()">💾 SIMPAN PDF</button>
<button class="btn-reset" onclick="location.reload()">🔄 RESET</button>
</div>

<div class="kertas-wrapper" id="capture-area">
<div class="kertas-a4">

<div class="judul-laporan">
LAPORAN PENDERASAN INFORMASI DAN PEMBANGUNAN PERTANIAN<br>
PENYULUH PERTANIAN TAHUN 2026
</div>

<table class="identitas">
<tr><td class="label-id">PERIODE</td><td class="titik-id">:</td><td><input id="id_periode"></td></tr>
<tr><td class="label-id">NAMA</td><td class="titik-id">:</td><td><input id="id_nama"></td></tr>
<tr><td class="label-id">NIP</td><td class="titik-id">:</td><td><input id="id_nip"></td></tr>
<tr><td class="label-id">WILAYAH</td><td class="titik-id">:</td><td><input id="id_wilayah"></td></tr>
</table>

<table class="tabel-data">
<thead>
<tr>
<th class="col-no">NO</th>
<th class="col-tgl">TGL</th>
<th>JUDUL</th>
<th class="col-foto">LIKE</th>
<th class="col-foto">COMMENT</th>
<th class="col-foto">SHARE</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

</div>
</div>

<script>
const tbody = document.getElementById('table-body');
let jumlahBaris = 2;

function renderBaris(i){
const tr=document.createElement('tr');
tr.innerHTML=`
<td>${i}</td>
<td><input type="date"></td>
<td><textarea class="input-judul"></textarea></td>
<td><div class="foto-container"><input type="file" class="file-input"></div></td>
<td><div class="foto-container"><input type="file" class="file-input"></div></td>
<td><div class="foto-container"><input type="file" class="file-input"></div></td>
`;
return tr;
}

function muatDataLokal(){
tbody.innerHTML="";
for(let i=1;i<=jumlahBaris;i++){
tbody.appendChild(renderBaris(i));
}
}

function tambahBaris(){
jumlahBaris++;
tbody.appendChild(renderBaris(jumlahBaris));
}

function simpanPDFAndroid(){
const element = document.querySelector('.kertas-a4'); // 🔥 FIX UTAMA
const wrapper = document.querySelector('.kertas-wrapper');

wrapper.style.padding='0';

document.getElementById('toolbar').style.display='none';

html2pdf().set({
margin:0,
filename:'LCS.pdf',
html2canvas:{scale:1},
jsPDF:{unit:'mm',format:'a4'}
}).from(element).save().then(()=>{
wrapper.style.padding='10px';
document.getElementById('toolbar').style.display='flex';
});
}
</script>

</body>
</html>
