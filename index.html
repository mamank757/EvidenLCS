<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LCS</title>

<style>
* { box-sizing: border-box; }
body { font-family: 'Times New Roman', serif; margin: 0; padding: 10px; background: #000; }

.container {
    max-width: 1150px; margin: auto; background: white;
    padding: 30px; border-radius: 8px;
}

table { width: 100%; border-collapse: collapse; table-layout: fixed; }
th, td { border: 1px solid #000; padding: 6px; }

th {
    background: #2ecc71 !important;
    color: #000 !important;
}

.controls, .action-area { margin-top: 15px; }

/* ===== MOBILE ===== */
@media screen and (max-width: 768px) {
    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }
}

/* ===== PRINT CSS ===== */
@media print {
    .controls, .action-area { display: none !important; }
}

/* ===== FIX HTML2PDF ===== */
.print-mode table { display: table !important; width: 100% !important; }
.print-mode thead { display: table-header-group !important; }
.print-mode tr { display: table-row !important; }
.print-mode td, .print-mode th { display: table-cell !important; }

.print-mode .controls,
.print-mode .action-area,
.print-mode input[type="file"] {
    display: none !important;
}
</style>
</head>

<body>

<div class="container">

<h3 style="text-align:center;">LAPORAN LCS</h3>

<input type="text" id="id_nama" placeholder="Nama Penyuluh"><br><br>

<table>
<thead>
<tr>
<th>No</th>
<th>Tanggal</th>
<th>Judul</th>
<th>Like</th>
<th>Comment</th>
<th>Share</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

<div class="controls">
<button onclick="addRow()">+ Tambah</button>
<button onclick="removeRow()">- Hapus</button>
</div>

<div class="action-area">
<button onclick="cetakLaporan()">DOWNLOAD PDF</button>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
// ================= DATA =================
let daftarJudulGlobal = [];

// ================= SINKRONISASI =================
async function sinkronisasiJudul() {
    try {
        const res = await fetch("https://script.google.com/macros/s/AKfycbzBRXwcAkJBPLvnvOdFuWKqag-XBq2U81kYBx3LyOKGCM0Sqx8WileVfvMa1T6BkEQH6A/exec");
        daftarJudulGlobal = await res.json();
    } catch (e) {
        console.log("Fallback aktif");
        daftarJudulGlobal = [
            "Kegiatan Penyuluhan",
            "Teknologi Pertanian",
            "Pendampingan Petani"
        ];
    }
}

// ================= TABLE =================
let count = 0;
const tableBody = document.getElementById("tableBody");

function isiSelect(select){
    select.innerHTML = '<option value="">Pilih Judul</option>';
    daftarJudulGlobal.forEach(j=>{
        let o = document.createElement("option");
        o.value = j;
        o.textContent = j;
        select.appendChild(o);
    });
}

function addRow(){
    count++;
    let tr = document.createElement("tr");

    tr.innerHTML = `
    <td>${count}</td>
    <td><input type="date"></td>
    <td>
        <select onchange="this.nextElementSibling.value=this.value"></select>
        <textarea></textarea>
    </td>
    <td><input type="file"></td>
    <td><input type="file"></td>
    <td><input type="file"></td>
    `;

    tableBody.appendChild(tr);
    isiSelect(tr.querySelector("select"));
}

function removeRow(){
    if(count>1){
        tableBody.removeChild(tableBody.lastChild);
        count--;
    }
}

// ================= PDF =================
function cetakLaporan(){
    const element = document.querySelector(".container");

    document.body.classList.add("print-mode");

    const opt = {
        margin: 0.5,
        filename: "LCS.pdf",
        html2canvas: { scale: 3 },
        jsPDF: { unit: 'cm', format: 'a4' }
    };

    setTimeout(()=>{
        html2pdf().set(opt).from(element).save().then(()=>{
            document.body.classList.remove("print-mode");
        });
    },500);
}

// ================= INIT =================
document.addEventListener("DOMContentLoaded", async ()=>{
    await sinkronisasiJudul();
    addRow();
    addRow();
});
</script>

</body>
</html>
