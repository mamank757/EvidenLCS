<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVIDEN LCS DIGITAL - ANDROID READY</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        /* CSS ASLI DARI BLOGSPOT ANDA */
        @page { size: A4; margin: 0; }
        body { font-family: Arial, sans-serif; background: #000; margin: 0; padding: 0; }
        .kertas-wrapper { padding: 20px; padding-top: 80px; }
        .panel-kendali {
            background: white; padding: 15px; border-radius: 8px;
            display: flex; justify-content: space-between; align-items: center;
            margin: 0 auto 20px auto; max-width: 210mm; position: fixed; top: 10px; left: 10px; right: 10px; z-index: 999;
        }
        button { padding: 10px; cursor: pointer; border-radius: 6px; border: none; color: white; font-weight: bold; }
        .btn-print { background: #0b544e; flex: 2; margin-right: 5px; }
        .btn-reset { background: #dc3545; }

        .kertas-a4 { width: 210mm; min-height: 297mm; padding: 15mm; margin: 0 auto; background: white; box-sizing: border-box; }
        .judul-laporan { text-align: center; font-weight: bold; font-size: 14pt; margin-bottom: 20px; text-transform: uppercase; color:#000; }
        
        .identitas { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 11pt; color:#000; }
        .identitas td { padding: 5px 0; border: none !important; }
        .identitas input { width: 100%; border: none; border-bottom: 1px dashed #ccc; font-size: 11pt; padding: 2px; }

        table.tabel-data { width: 100%; border-collapse: collapse; border: 2px solid black; }
        table.tabel-data th { background-color: #666; color: white; padding: 10px; border: 1px solid black; }
        table.tabel-data td { border: 1px solid black; padding: 5px; vertical-align: middle; }

        .judul-wrapper { position: relative; min-height: 100px; }
        textarea.input-judul { width: 100%; height: 80px; border: none; resize: none; font-size: 10pt; }

        .foto-container { width: 100px; height: 150px; border: 1px dashed #ccc; margin: auto; position: relative; background: #f9f9f9; display: flex; align-items: center; justify-content: center; }
        .img-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        .file-input { position: absolute; width: 100%; height: 100%; opacity: 0; z-index: 10; cursor: pointer; }

        .no-export { display: none !important; }

        @media screen and (max-width: 768px) {
            .kertas-a4 { width: 100%; padding: 10px; min-height: auto; }
            .panel-kendali { position: static; margin-bottom: 10px; width: 100%; }
            .td-foto { display: block; width: 100%; margin-bottom: 10px; }
            .foto-container { width: 120px; height: 160px; }
        }
    </style>
</head>
<body onload="muatDataLokal()">

    <div class="panel-kendali no-print-area">
        <button class="btn-print" onclick="simpanPDFAndroid()">💾 SIMPAN PDF (ANDROID)</button>
        <button class="btn-reset" onclick="tampilkanPopup()">🔄 RESET</button>
    </div>

    <div class="kertas-wrapper" id="area-laporan">
        <div class="kertas-a4">
            <div class="judul-laporan">
                LAPORAN PENDERASAN INFORMASI DAN PEMBANGUNAN PERTANIAN<br>
                PENYULUH PERTANIAN TAHUN 2026
            </div>

            <table class="identitas">
                <tr><td width="140">PERIODE</td><td width="20">:</td><td><input type="text" id="id_periode" oninput="simpanTeks('id_periode')"></td></tr>
                <tr><td>Nama Penyuluh</td><td>:</td><td><input type="text" id="id_nama" oninput="simpanTeks('id_nama')"></td></tr>
                <tr><td>NIP.</td><td>:</td><td><input type="text" id="id_nip" oninput="formatNIP(this); simpanTeks('id_nip')"></td></tr>
                <tr><td>Wilayah Binaan</td><td>:</td><td><input type="text" id="id_wilayah" oninput="simpanTeks('id_wilayah')"></td></tr>
            </table>

            <table class="tabel-data">
                <thead>
                    <tr>
                        <th width="100">TANGGAL</th>
                        <th>Judul Konten</th>
                        <th width="110">Like</th>
                        <th width="110">Comen</th>
                        <th width="110">Share</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="popup-reset" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:10px; text-align:center;">
            <p>Bersihkan semua data?</p>
            <button onclick="konfirmasiReset()" style="background:red; padding:10px;">Ya, Hapus</button>
            <button onclick="tutupPopup()" style="background:gray; padding:10px;">Batal</button>
        </div>
    </div>

    <script>
        const tbody = document.getElementById('table-body');
        let jumlahBaris = parseInt(localStorage.getItem('jumlahBaris')) || 3;

        function renderBaris(i) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" id="tgl_${i}" style="width:100%; border:none; text-align:center;" oninput="simpanTeks('tgl_${i}')"></td>
                <td><textarea id="judul_${i}" class="input-judul" oninput="simpanTeks('judul_${i}')"></textarea></td>
                <td><div class="foto-container"><img id="img_like_${i}" class="img-preview"><input type="file" class="file-input no-print-area" onchange="prosesGambar(this, 'img_like_${i}')"></div></td>
                <td><div class="foto-container"><img id="img_comen_${i}" class="img-preview"><input type="file" class="file-input no-print-area" onchange="prosesGambar(this, 'img_comen_${i}')"></div></td>
                <td><div class="foto-container"><img id="img_share_${i}" class="img-preview"><input type="file" class="file-input no-print-area" onchange="prosesGambar(this, 'img_share_${i}')"></div></td>
            `;
            return tr;
        }

        // LOAD DATA
        function muatDataLokal() {
            tbody.innerHTML = "";
            for (let i = 1; i <= jumlahBaris; i++) {
                tbody.appendChild(renderBaris(i));
                if(localStorage.getItem(`tgl_${i}`)) document.getElementById(`tgl_${i}`).value = localStorage.getItem(`tgl_${i}`);
                if(localStorage.getItem(`judul_${i}`)) document.getElementById(`judul_${i}`).value = localStorage.getItem(`judul_${i}`);
                
                ['like', 'comen', 'share'].forEach(type => {
                    const savedImg = localStorage.getItem(`img_${type}_${i}`);
                    if(savedImg) {
                        const imgEl = document.getElementById(`img_${type}_${i}`);
                        imgEl.src = savedImg;
                        imgEl.style.display = 'block';
                    }
                });
            }
            ['id_periode', 'id_nama', 'id_nip', 'id_wilayah'].forEach(id => {
                if(localStorage.getItem(id)) document.getElementById(id).value = localStorage.getItem(id);
            });
        }

        function simpanTeks(id) { localStorage.setItem(id, document.getElementById(id).value); }

        function prosesGambar(input, imgId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const img = document.getElementById(imgId);
                    img.src = e.target.result;
                    img.style.display = 'block';
                    localStorage.setItem(imgId, e.target.result);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function formatNIP(input) {
            let val = input.value.replace(/\D/g, '');
            if (val.length > 18) val = val.substr(0, 18);
            input.value = val.replace(/(\d{8})(\d{6})(\d{1})(\d{3})/, '$1 $2 $3 $4');
        }

        // FUNGSI PDF UNTUK ANDROID
        function simpanPDFAndroid() {
            const element = document.getElementById('area-laporan');
            const nama = document.getElementById('id_nama').value || "Laporan";
            
            // Sembunyikan elemen input file dan tombol
            document.querySelectorAll('.no-print-area').forEach(el => el.style.display = 'none');

            const opt = {
                margin: [10, 5, 10, 5],
                filename: `LCS_${nama}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                document.querySelectorAll('.no-print-area').forEach(el => el.style.display = '');
                alert("PDF berhasil disimpan!");
            });
        }

        function tampilkanPopup() { document.getElementById('popup-reset').style.display = 'flex'; }
        function tutupPopup() { document.getElementById('popup-reset').style.display = 'none'; }
        function konfirmasiReset() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
