<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVIDEN LCS DIGITAL - King Mamank</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Times New Roman', Times, serif; background: #000; margin: 0; padding: 0; }

        .btn-home {
            position: fixed;
            bottom: 80px;
            right: 20px;
            background: #27ae60;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 10001;
            border: 2px solid white;
        }

        .panel-kendali {
            background: #ffffff;
            padding: 10px;
            display: flex;
            position: sticky;
            top: 0;
            z-index: 9999;
        }

        button { padding: 10px; border: none; color: white; font-size: 11px; }
        .btn-print { background: #0b544e; flex: 2; margin: 0 5px; }
        .btn-add { background: #27ae60; flex: 1; }
        .btn-reset { background: #dc3545; flex: 1; }

        .kertas-wrapper { padding: 10px; display: flex; justify-content: center; }

        .kertas-a4 {
            width: 210mm;
            min-height: 297mm;
            padding: 10mm 10mm;
            background: white;
        }

        .judul-laporan {
            text-align: center;
            font-weight: bold;
            font-size: 12pt;
            margin-bottom: 15px;
        }

        .identitas { width: 100%; margin-bottom: 15px; font-size: 10pt; }
        .label-id { width: 110px; font-weight: bold; }

        table.tabel-data {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            border: 1.5px solid black;
        }

        table.tabel-data th {
            background: #2ecc71;
            border: 1px solid black;
            font-size: 8pt;
            padding: 5px;
        }

        table.tabel-data td {
            border: 1px solid black;
            font-size: 8.5pt;
            padding: 3px;
            text-align: center;
        }

        th, td { overflow: hidden; }

        /* 🔥 KOLOM FIX HP */
        .col-no    { width: 25px; }
        .col-tgl   { width: 100px; }
        .col-foto  { width: 65px; }
        .col-judul { width: auto; }

        .input-tgl {
            width: 100%;
            min-width: 0;
            border: none;
            text-align: center;
            font-size: 8.5pt;
            background: transparent;
        }

        textarea.input-judul {
            width: 95%;
            font-size: 9pt;
            border: none;
            resize: none;
            background: transparent;
        }

        .foto-container {
            width: 100%;
            height: 100px;
            border: 1px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .file-input {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
        }

        @media screen and (max-width: 768px) {
            .kertas-a4 {
                width: 100% !important;
                padding: 10px !important;
            }
        }
    </style>
</head>
<body>

<!-- ⚠️ BAGIAN HTML & JS TIDAK DIUBAH -->
<!-- (semua tetap sama seperti kode kamu) -->

</body>
</html>
